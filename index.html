<!DOCTYPE html>
<html lang="en">
    <head>
        <style>
        .alink{
            display:inline-block;
            color: black; 
            background-color: #efefef; 
            border-style: solid;
            margin: 4px 0px; 
            padding: 10px 0px; 
            font-family: system-ui;
        }
        div{
            text-align: center;
            font-size: 30px;
            font-family: sans-serif;
        }
        </style>
        <title>kan's workshop</title>
    </head>
    <body>
        <div class="text">projects:</div>
        <div><a href="./clicker" class="alink">clicker game</a></div>
        <div><a href="./banana" class="alink">banana button</a></div>
        <div><a href="./message" class="alink">latest quote</a></div>
        <div><a href="./numbers" class="alink">number game</a></div>
        <div><a href="./π" class="alink">count to π</a></div>
        <div style="font-size: 40px;font-family: system-ui;" class="text">i will start adding more things here soon!</div>
        <script>
            const alink = document.getElementsByClassName("alink")
            function loop(){
                for(const i of alink){
                    i.style.fontSize = (1/window.innerWidth)*60000+"px"
                    i.style.width = "100%"
                }
                bord()
                requestAnimationFrame(loop)
            }
            function bord(){
                const color = window.matchMedia("(prefers-color-scheme: dark)").matches
                const alink = document.getElementsByClassName("alink")
                const text = document.getElementsByClassName("text")
                if(color){
                    for(const i of text)i.style.color = "#FFFFFF"
                    document.body.style.backgroundColor="#000000"
                    for(const i of alink){
                        i.style.color = "#FFFFFF"
                        i.style.backgroundColor = "#000000"
                    }
                }else{
                    for(const i of text)i.style.color = "#000000"
                    document.body.style.backgroundColor="#FFFFFF"
                    for(const i of alink){
                        i.style.color = "#000000"
                        i.style.backgroundColor = "#FFFFFF"
                    }
                }
            }
            loop()
        </script>
    </body>
