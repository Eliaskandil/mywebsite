<!DOCTYPE html>
<html lang="en">
    <head>
        <title>banana</title>
        <style>
            .alink{
                color: black; 
                background-color: #efefef; 
                outline:auto; 
                outline-color: black; 
                margin: 10px 10px; 
                padding: 10px 20px; 
                font-size: 1.2em; 
                top: 600px;
            }
            div{
                width: 99%;text-align:center;
            }
        </style>
    </head>
    <body>
        <div><img src="./assets/banana.png" onclick="bana()" id="bnd" width="600px" height="600px"></img></div>
        <div style="height:40px; letter-spacing: 7px;" id="COUNT">THE BANANA COUNT: 1</div>
        <div><a href="./" class="alink">back to home</a></div>
        <audio src="./assets/banana.mp3" id="band"></audio>
        <script>
            async function sammyreq(ENDPOINT) {
                let path = "https://api.sanojo.com:12520/";
                const res = await fetch(path + ENDPOINT, {
                    method: "POST"
                });
                const json = await res.json();
                return {
                    res: res,
                    json: json,
                };
            }
            const wsok = new WebSocket("https://api.sanojo.com:12520/api/realtime")
            function setTXT(num){
                document.getElementById("COUNT").innerText = "THE BANANA COUNT: " + num
            }
            onFrame()
            function dord(){
                const color = window.matchMedia("(prefers-color-scheme: dark)").matches
                const baw = document.getElementsByClassName("alink")[0]
                const count = document.getElementById("COUNT")
                if(color){
                    document.body.style.backgroundColor="#000000"
                    baw.style.backgroundColor = "#111111"
                    baw.style.color = "#EEEEEE"
                    count.style.color = "#FFFFFF"
                }else{
                    document.body.style.backgroundColor="#FFFFFF"
                    baw.style.backgroundColor = "#EEEEEE"
                    baw.style.color = "#111111"
                    count.style.color = "#000000"
                }
            }
            function onFrame(){
                if(window.innerWidth<600){
                    document.getElementById("bnd").width = window.innerWidth
                    document.getElementById("bnd").height = window.innerWidth
                }
                dord()
                requestAnimationFrame(onFrame)
            }
            let debounce = false
            async function bana(){
                if(!debounce){
                    if(document.timeline.currentTime<=5)return;
                    document.getElementById("band").play()
                    debounce = true
                    const rets = await sammyreq("api/banana/inc")
                    setTXT(rets.json.count)
                    document.getElementById("bnd").style.opacity = 0.5
                    await new Promise(resolve=>setTimeout(resolve,3000))
                    document.getElementById("bnd").style.opacity = 1
                    debounce = false
                }
            }
            
            setTimeout(()=>{
                wsok.send("COUNT")
            },500)
            wsok.addEventListener("message",(msg)=>{
                setTXT(msg.data)
            })
        </script>
    </body>
</html>
